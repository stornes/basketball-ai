# ═══════════════════════════════════════════════════════════════════
# PIPELINE INTEGRATION
# ═══════════════════════════════════════════════════════════════════
pipeline_integration:
  new_stages:
    stage_3_6:
      name: "Event Enrichment"
      description: "Process shot events through 3pt classifier, run heuristic detectors"
      components:
        - "ThreePointClassifier — labels shots as 2pt/3pt from court_position"
        - "ReboundDetector — post-miss ball tracking (Phase 2)"
        - "AssistDetector — pre-score possession chain (Phase 2)"
        - "StealDetector — cross-team possession flip (Phase 2)"
    stage_4_modified:
      name: "Box Score Computation"
      description: "Replaces GameMetrics.player_stats() with BoxScoreCompiler"
      components:
        - "BoxScoreCompiler — aggregates all events into PlayerBoxScore per player"
        - "TeamBoxScore — aggregates per team"
        - "GameBoxScore — wraps both teams + metadata + profile"
    stage_4_5:
      name: "Advanced Metrics (Phase 3)"
      description: "Compute TS%, eFG%, USG%, PER from box score data"
    stage_5_modified:
      name: "Output generation"
      new_outputs:
        - "box_score.json — full box score in JSON format"
        - "box_score.txt — formatted text table (professional or youth)"

  cli_changes:
    new_option: "--profile professional|youth"
    default: "professional"
    effect: "Controls which renderer and KPIs are used in output"

# ═══════════════════════════════════════════════════════════════════
# VERIFICATION
# ═══════════════════════════════════════════════════════════════════
verification:
  tests:
    - "All existing 42 tests pass (backward-compatible)"
    - "PlayerBoxScore dataclass: all fields default correctly"
    - "Computed properties: FG%, 3P%, FT%, REB, PTS all correct"
    - "BoxScoreProfile filters correct stats per profile"
    - "Youth impact line renders correct format"
    - "Youth KPIs compute correctly (AST/TO, DAI, EFF)"
    - "Three-point classification geometry correct for corner and arc threes"
    - "Professional renderer produces NBA-standard table"
    - "JSON serialisation round-trips correctly"
  integration:
    - "Full pipeline run produces box_score.json and box_score.txt"
    - "Youth profile produces impact lines for all players"
    - "stat_sources correctly labels each stat's provenance"
